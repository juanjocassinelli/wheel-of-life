<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wheel of Life</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0e0e10;
    --surface: #18181b;
    --surface2: #27272a;
    --border: rgba(255,255,255,0.08);
    --text: #f4f4f5;
    --muted: #71717a;
    --radius: 14px;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 2.5rem 1rem 4rem;
  }

  header { text-align: center; margin-bottom: 2.5rem; }

  header h1 {
    font-family: 'DM Serif Display', serif;
    font-size: clamp(2rem, 5vw, 3rem);
    font-weight: 400;
    background: linear-gradient(135deg, #f4f4f5 30%, #a78bfa);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 0.4rem;
  }

  header p { color: var(--muted); font-size: 0.95rem; font-weight: 300; }

  .layout {
    width: 100%;
    max-width: 860px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1.25rem;
    align-items: start;
  }

  @media (max-width: 640px) { .layout { grid-template-columns: 1fr; } }

  .panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 1.5rem;
  }

  .panel-label {
    font-size: 0.68rem;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--muted);
    margin-bottom: 1.25rem;
  }

  /* ── Chart side ── */
  .chart-side { display: flex; flex-direction: column; align-items: center; gap: 1rem; }

  .chart-wrap { position: relative; width: 100%; height: 270px; }

  .avg-num {
    font-family: 'DM Serif Display', serif;
    font-size: 3rem;
    font-weight: 400;
    line-height: 1;
  }

  .avg-lbl {
    font-size: 0.7rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-top: 3px;
    text-align: center;
  }

  .legend {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    justify-content: center;
  }

  .leg {
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 0.72rem;
    color: var(--muted);
  }

  .leg-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  /* ── Sliders side ── */
  .sliders-side { display: flex; flex-direction: column; gap: 0.75rem; }

  .sl-row {
    background: var(--surface2);
    border-radius: 10px;
    padding: 10px 14px 12px;
  }

  .sl-top {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 8px;
  }

  .sl-name { font-size: 0.82rem; font-weight: 500; color: var(--text); }

  .sl-val { font-size: 0.9rem; font-weight: 500; min-width: 18px; text-align: right; }

  input[type="range"] {
    -webkit-appearance: none;
    appearance: none;
    width: 100%;
    height: 5px;
    border-radius: 3px;
    outline: none;
    cursor: pointer;
    background: rgba(255,255,255,0.1);
  }

  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    appearance: none;
    width: 18px;
    height: 18px;
    border-radius: 50%;
    cursor: pointer;
    border: 2px solid var(--bg);
    transition: transform 0.15s;
  }

  input[type="range"]::-moz-range-thumb {
    width: 18px;
    height: 18px;
    border-radius: 50%;
    cursor: pointer;
    border: 2px solid var(--bg);
  }

  input[type="range"]::-webkit-slider-thumb:hover { transform: scale(1.3); }

  /* ── Actions ── */
  .actions {
    width: 100%;
    max-width: 860px;
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 0.9rem;
    margin-top: 1.25rem;
  }

  @media (max-width: 640px) { .actions { grid-template-columns: 1fr; } }

  .btn {
    font-family: 'DM Sans', sans-serif;
    font-size: 0.9rem;
    font-weight: 500;
    padding: 0.85rem 1rem;
    border-radius: var(--radius);
    cursor: pointer;
    border: 1px solid var(--border);
    transition: all 0.18s;
  }

  .btn-ghost { background: var(--surface); color: var(--muted); }
  .btn-ghost:hover { background: var(--surface2); color: var(--text); }

  .btn-purple { background: #7c5ff0; color: #fff; border-color: transparent; }
  .btn-purple:hover { background: #6d50e0; transform: translateY(-1px); }

  .btn-outline { background: transparent; color: #a78bfa; border-color: #a78bfa55; }
  .btn-outline:hover { background: #1e1640; transform: translateY(-1px); }

  footer { margin-top: 2.5rem; font-size: 0.75rem; color: #3f3f46; }
</style>
</head>
<body>

<header>
  <h1>Wheel of Life</h1>
  <p>Rate each area of your life from 0 to 10</p>
</header>

<div class="layout">

  <!-- Left: chart -->
  <div class="panel chart-side">
    <div class="panel-label">Your wheel</div>
    <div class="chart-wrap"><canvas id="wChart"></canvas></div>
    <div>
      <div class="avg-num" id="avgNum" style="color:#eab308">5.0</div>
      <div class="avg-lbl">overall average</div>
    </div>
    <div class="legend">
      <span class="leg"><span class="leg-dot" style="background:#ef4444"></span>Critical 0–3</span>
      <span class="leg"><span class="leg-dot" style="background:#eab308"></span>Growing 4–6</span>
      <span class="leg"><span class="leg-dot" style="background:#22c55e"></span>Thriving 7–10</span>
    </div>
  </div>

  <!-- Right: sliders — hardcoded HTML, no JS generation -->
  <div class="panel sliders-side">
    <div class="panel-label">Your ratings</div>

    <div class="sl-row">
      <div class="sl-top">
        <span class="sl-name">Finances</span>
        <span class="sl-val" id="v0" style="color:#eab308">5</span>
      </div>
      <input type="range" min="0" max="10" step="1" value="5" id="s0" oninput="upd(0,this.value)">
    </div>

    <div class="sl-row">
      <div class="sl-top">
        <span class="sl-name">Work / Academic</span>
        <span class="sl-val" id="v1" style="color:#eab308">5</span>
      </div>
      <input type="range" min="0" max="10" step="1" value="5" id="s1" oninput="upd(1,this.value)">
    </div>

    <div class="sl-row">
      <div class="sl-top">
        <span class="sl-name">Health</span>
        <span class="sl-val" id="v2" style="color:#eab308">5</span>
      </div>
      <input type="range" min="0" max="10" step="1" value="5" id="s2" oninput="upd(2,this.value)">
    </div>

    <div class="sl-row">
      <div class="sl-top">
        <span class="sl-name">Romance</span>
        <span class="sl-val" id="v3" style="color:#eab308">5</span>
      </div>
      <input type="range" min="0" max="10" step="1" value="5" id="s3" oninput="upd(3,this.value)">
    </div>

    <div class="sl-row">
      <div class="sl-top">
        <span class="sl-name">Friendship</span>
        <span class="sl-val" id="v4" style="color:#eab308">5</span>
      </div>
      <input type="range" min="0" max="10" step="1" value="5" id="s4" oninput="upd(4,this.value)">
    </div>

    <div class="sl-row">
      <div class="sl-top">
        <span class="sl-name">Personal development</span>
        <span class="sl-val" id="v5" style="color:#eab308">5</span>
      </div>
      <input type="range" min="0" max="10" step="1" value="5" id="s5" oninput="upd(5,this.value)">
    </div>

  </div>
</div>

<div class="actions">
  <button class="btn btn-ghost" onclick="doReset()">&#8635; Reset</button>
  <button class="btn btn-purple" onclick="doDownload()">Download image &darr;</button>
  <button class="btn btn-outline" onclick="doSubmit()">Submit &rarr;</button>
</div>

<footer>Drag the sliders &mdash; your wheel updates in real time</footer>

<script>
const TALLY_FORM_ID = 'YOUR_TALLY_FORM_ID';

const LABELS = ['Finances','Work / Academic','Health','Romance','Friendship','Personal development'];
const KEYS   = ['finances','work','health','romance','friendship','personal'];
const vals   = [5,5,5,5,5,5];

function sc(v) {
  v = Math.max(0, Math.min(10, +v));
  if (v <= 5) {
    const t = v / 5;
    return 'rgb('+Math.round(239+(234-239)*t)+','+Math.round(68+(179-68)*t)+','+Math.round(68+(8-68)*t)+')';
  }
  const t = (v-5)/5;
  return 'rgb('+Math.round(234+(34-234)*t)+','+Math.round(179+(197-179)*t)+','+Math.round(8+(94-8)*t)+')';
}

function paintSlider(i, color) {
  const sl = document.getElementById('s'+i);
  const pct = (vals[i] / 10) * 100;
  sl.style.background = 'linear-gradient(to right,'+color+' 0%,'+color+' '+pct+'%,rgba(255,255,255,0.1) '+pct+'%,rgba(255,255,255,0.1) 100%)';

  const existing = document.getElementById('sthumb'+i);
  if (existing) existing.remove();
  const s = document.createElement('style');
  s.id = 'sthumb'+i;
  s.textContent = '#s'+i+'::-webkit-slider-thumb{background:'+color+';box-shadow:0 0 7px '+color+'99}#s'+i+'::-moz-range-thumb{background:'+color+'}';
  document.head.appendChild(s);
}

const chart = new Chart(document.getElementById('wChart').getContext('2d'), {
  type: 'radar',
  data: {
    labels: LABELS,
    datasets: [{
      data: [...vals],
      backgroundColor: 'rgba(124,95,240,0.12)',
      borderColor: '#7c5ff0',
      borderWidth: 2,
      pointBackgroundColor: vals.map(v => sc(v)),
      pointBorderColor: 'transparent',
      pointRadius: 5,
      pointHoverRadius: 8
    }]
  },
  options: {
    responsive: true,
    maintainAspectRatio: false,
    plugins: { legend: { display: false } },
    scales: { r: {
      min: 0, max: 10,
      ticks: { display: false },
      grid: { color: 'rgba(255,255,255,0.07)' },
      angleLines: { color: 'rgba(255,255,255,0.07)' },
      pointLabels: {
        color: '#a1a1aa',
        font: { size: 11, family: 'DM Sans', weight: '500' },
        padding: 10
      }
    }},
    animation: { duration: 160 }
  }
});

function refreshChart() {
  chart.data.datasets[0].data = [...vals];
  chart.data.datasets[0].pointBackgroundColor = vals.map(v => sc(v));
  chart.update('none');
}

function refreshAvg() {
  const avg = vals.reduce((a,b)=>a+b,0)/vals.length;
  const el = document.getElementById('avgNum');
  el.textContent = avg.toFixed(1);
  el.style.color = sc(avg);
}

function upd(i, val) {
  vals[i] = parseInt(val);
  const c = sc(vals[i]);
  document.getElementById('v'+i).textContent = vals[i];
  document.getElementById('v'+i).style.color = c;
  paintSlider(i, c);
  refreshChart();
  refreshAvg();
}

function doReset() {
  for (let i=0; i<6; i++) {
    vals[i] = 5;
    document.getElementById('s'+i).value = 5;
    document.getElementById('v'+i).textContent = 5;
    document.getElementById('v'+i).style.color = sc(5);
    paintSlider(i, sc(5));
  }
  refreshChart();
  refreshAvg();
}

function doDownload() {
  const src = document.getElementById('wChart');
  const off = document.createElement('canvas');
  off.width = src.width * 2;
  off.height = src.height * 2;
  const oc = off.getContext('2d');
  oc.scale(2, 2);
  oc.fillStyle = '#0e0e10';
  oc.fillRect(0, 0, src.width, src.height);
  oc.drawImage(src, 0, 0, src.width, src.height);
  const a = document.createElement('a');
  a.download = 'wheel-of-life.png';
  a.href = off.toDataURL('image/png');
  a.click();
}

function doSubmit() {
  if (TALLY_FORM_ID === 'YOUR_TALLY_FORM_ID') {
    alert('Add your Tally form ID to the TALLY_FORM_ID variable in the HTML file.');
    return;
  }
  const p = new URLSearchParams();
  KEYS.forEach((k,i) => p.set(k, vals[i]));
  window.open('https://tally.so/r/'+TALLY_FORM_ID+'?'+p.toString(), '_blank');
}

// Init paint on load
for (let i=0; i<6; i++) paintSlider(i, sc(5));
</script>
</body>
</html>
